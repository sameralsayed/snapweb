<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A Snapchat-like web app for sharing moments and chatting with friends.">
    <meta name="keywords" content="snapchat, social media, chat, stories, moments">
    <meta name="author" content="SAMER SAEID">
    <title>Snapweb - Snapchat-like Web App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">👻 Snapweb</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-camera"></i></a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-comment-dots"></i></a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-users"></i></a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-user"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h5 class="card-title">📸 Camera</h5>
                        <div class="camera mb-3">
                            <div class="camera-preview"></div>
                        </div>
                        <button class="btn btn-primary" id="captureBtn"><i class="fas fa-camera"></i> Capture</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">📱 Stories</h5>
                        <div class="stories">
                            <div class="story">
                                <img src="https://via.placeholder.com/100" alt="Story" class="story-img rounded-circle">
                                <p class="mt-2">User 1</p>
                            </div>
                            <div class="story">
                                <img src="https://via.placeholder.com/100" alt="Story" class="story-img rounded-circle">
                                <p class="mt-2">User 2</p>
                            </div>
                            <div class="story">
                                <img src="https://via.placeholder.com/100" alt="Story" class="story-img rounded-circle">
                                <p class="mt-2">User 3</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">💬 Chat</h5>
                        <div class="chat-box">
                            <div class="message">
                                <p><strong>You:</strong> Hello!</p>
                            </div>
                            <div class="message">
                                <p><strong>Friend:</strong> Hi there!</p>
                            </div>
                        </div>
                        <input type="text" class="form-control mt-3" placeholder="Type a message...">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-light">
        <div class="container">
            <div class="text-center">
                <p class="mb-0">Made by ♥️ <a href="https://bio.link/samer" target="_blank">SAMER SAEID</a></p>
                <p class="mt-2">Copyright SAMER SAEID</p>
            </div>
        </div>
    </footer>

    <!-- jQuery, Popper.js, Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
